<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <style>
        body {
            background: linear-gradient(to right, #b7e3b0, #5fa85f);
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            background: white;
            padding: 30px;
            width: 320px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        input, button {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            background: #0b6623;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #094d1a;
        }
        .msg {
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Reset Password</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="newpass" placeholder="New Password">
    <input type="password" id="confirmpass" placeholder="Confirm Password">

    <button onclick="resetPassword()">Set New Password</button>
    <p id="msg" class="msg"></p>
</div>

<script>
function resetPassword() {
    const user = document.getElementById("username").value.trim();
    const newPass = document.getElementById("newpass").value;
    const confirmPass = document.getElementById("confirmpass").value;
    const msg = document.getElementById("msg");

    if (!user || !newPass || !confirmPass) {
        msg.innerText = "All fields are required!";
        msg.style.color = "red";
        return;
    }

    let users;
    try {
        users = JSON.parse(localStorage.getItem("users")) || {};
    } catch (e) {
        users = {};
    }

    if (!users[user]) {
        msg.innerText = "User not found!";
        msg.style.color = "red";
        return;
    }

    if (newPass !== confirmPass) {
        msg.innerText = "Passwords do not match!";
        msg.style.color = "red";
        return;
    }

    // Optional: password strength check
    if (newPass.length < 6) {
        msg.innerText = "Password must be at least 6 characters!";
        msg.style.color = "red";
        return;
    }

    users[user].password = newPass;
    localStorage.setItem("users", JSON.stringify(users));

    msg.style.color = "green";
    msg.innerText = "Password updated successfully! Redirecting...";

    setTimeout(() => {
        window.location.href = "login.html"; // change if needed
    }, 1500);
}
</script>

</body>
</html>
